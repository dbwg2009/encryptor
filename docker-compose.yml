services:
  cipher:
    build: .
    image: ascii-cipher-vault:latest
    container_name: cipher-vault
    restart: unless-stopped
    environment:
      CIPHER_SECRET: ${CIPHER_SECRET:?run "openssl rand -hex 32" and put it in .env}
      CIPHER_REGISTRATION_TOKEN: ${CIPHER_REGISTRATION_TOKEN:-}
      CIPHER_TRUST_PROXY: "1"
    volumes:
      # Named volume — Docker manages ownership so the container's non-root
      # user can always write. Inspect on the host with:
      #   docker volume inspect cipher-vault_cipher_data
      - cipher_data:/data
      # If you'd rather have a host directory you can rsync directly, swap
      # the line above for the bind mount below AND run, on the host:
      #   mkdir -p ./data && sudo chown -R 1000:1000 ./data
      # - ./data:/data
    ports:
      - "8765:8000"
    networks:
      - default


volumes:
  cipher_data:
